aid: volocopter
name: Volocopter
description: >-
  Volocopter is a German urban air mobility company developing electric
  vertical take-off and landing (eVTOL) aircraft for passenger and cargo use.
  Its product portfolio includes VoloCity, a two-seat multicopter air taxi
  pursued under EASA SC-VTOL certification; VoloRegion, a longer-range
  fixed-wing transition design for inter-city flights; VoloDrone, a heavy-lift
  cargo drone; and VoloIQ, a digital operations platform built on Microsoft
  Azure for fleet, route, and vertiport management. Volocopter has demonstrated
  flights in numerous cities including Paris, Singapore, Seoul, and Dubai, and
  worked toward operations around the Paris 2024 Olympics. The company
  experienced significant financial restructuring in 2024-2025 and ownership
  changes affecting commercial timelines; current status should be verified
  against the latest newsroom updates.
